services:
  vllm:
    image: vllm/vllm-openai:latest
    container_name: vllm-gguf-server
    runtime: nvidia
    volumes:
      - ./models:/models
      - ~/.cache/huggingface:/root/.cache/huggingface
    environment:
      - HUGGING_FACE_HUB_TOKEN=${HF_TOKEN:-}
    command: >
      --model Qwen/Qwen3.5-0.8B
      --tokenizer-mode auto
      --max-model-len 8192
      --gpu-memory-utilization 0.4
      --enable-prefix-caching
      --disable-log-stats
      --enforce-eager
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    ipc: host
    restart: unless-stopped

  backend:
    build: 
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
    environment:
      - PORT=8000
      - HOST=0.0.0.0
    restart: unless-stopped

  frontend:
    image: nginx:alpine
    ports:
      - "3000:80"
    volumes:
      - ./ui:/usr/share/nginx/html:ro
    restart: unless-stopped